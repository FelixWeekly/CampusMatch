<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园捞人大厅</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 针对大厅补充一点点特定样式 */
        .dashboard-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .post-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .post-list { display: flex; flex-direction: column; gap: 15px; }
        .post-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .post-tag { background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .post-author { color: #6b7280; font-size: 14px; margin-top: 10px; }
        textarea { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #d1d5db; border-radius: 6px; resize: vertical; }
    </style>
</head>
<body style="background-color: #f3f4f6; display: block;">

    <div class="dashboard-container">
        <!-- 头部导航 (使用全新的 dash-header 样式) -->
        <div class="dash-header">
            <h1 id="welcome-text">欢迎来到大厅</h1>
            <div class="header-btns">
                <button class="btn-inbox" onclick="openInbox()">🔔 我的收件箱</button>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- 发布帖子区域 (使用 publish-card 样式) -->
        <!-- 发布帖子区域 -->
        <div class="publish-card">
            <h2 style="font-size: 20px; color: #111827; margin-bottom: 24px;">发布新任务 / 捞人帖 📢</h2>
            
            <select id="post-type" onchange="updatePlaceholders()">
                <option value="寻人组队">寻人组队</option>
                <option value="提供技能">提供技能</option>
            </select>
            
            <input type="text" id="post-title" placeholder="一句话概括你的需求 (如：急寻一名会弹吉他的同学迎新晚会伴奏)">
            
            <textarea id="post-content" rows="4" placeholder="详细描述一下任务时间、地点、要求或可能会愿意提供的报酬..."></textarea>
            
            <!-- 🌟 关键：用 flex-end 容器把按钮推到最右边 -->
            <div class="publish-actions">
                <button class="btn-publish" onclick="createPost()">发 布</button>
            </div>
        </div>

        <!-- 帖子列表展示区域 -->
        <h2 style="color: #111827; margin-bottom: 20px; font-size: 22px;">最新帖子 📋</h2>
        <div id="posts-container">
            <p style="text-align:center; color:#9ca3af; padding: 40px;">正在加载帖子...</p>
        </div>
    </div>

    <!-- 🌟 新增：消息弹窗 (默认用 display: none 隐藏) -->
    <div id="inbox-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0;">🔔 我的收件箱</h2>
                <button onclick="closeInbox()" style="background: none; border: none; color: #9ca3af; font-size: 24px; cursor: pointer; width: auto; padding: 0;">&times;</button>
            </div>
            
            <!-- 消息列表会被填充到这里 -->
            <div id="inbox-messages">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
